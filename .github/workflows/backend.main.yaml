name: Deploy Python project to Azure Function App

on:
  push:
    branches: [ main ]
    paths:
      - "backend/**"

env:
  AZURE_FUNCTIONAPP_NAME: 'page-counter'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './backend/api'
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Run Unit Tests
      shell: bash
      run: |
        cd backend/api
        python -m venv .venv
        source .venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt
        cd ..
        python -m pytest tests -v

    - name: Login via Azure CLI
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Functions (Flex Consumption)
      shell: bash
      run: |
        cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        zip -r /tmp/function.zip . --exclude ".venv/*" --exclude "__pycache__/*" --exclude "*.pyc"
        az functionapp deployment source config-zip \
          --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
          --resource-group crc-backend-rg \
          --src /tmp/function.zip
